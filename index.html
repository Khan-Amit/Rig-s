<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rig-S® Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Rig-S®</h1>

<p>Professional Dashboard</p>

</header>

<div class="container">

<!-- Wallet -->

<div class="panel">

<h2>Wallet</h2>

<input
id="walletAddress"
type="text"
readonly
value="45ktWDeTNtUcVMXfJRKS6bbXMznMAStZFX6niJHcVy9uQk132bHJ21QTC5AKvqyx9XJN5e7mPc3vViyGnB2BM6DD1ZoAoZb">

<p>

Status :

<span id="walletStatus">

Ready

</span>

</p>

</div>

<!-- Pool -->

<div class="panel">

<h2>Pool</h2>

<select id="pool">

<option>SupportXMR</option>

<option>MoneroOcean</option>

<option>P2Pool</option>

<option>Custom</option>

</select>

</div>

<!-- Gauges -->

<div class="gauges">

<div class="gauge">

<div
id="speedDial"
class="dial">

0 H/s

</div>

<p>Speed</p>

</div>

<div class="gauge">

<div
id="heatDial"
class="dial">

0 °C

</div>

<p>Heat</p>

</div>

<div class="gauge">

<div
id="timeDial"
class="dial">

00:00:00

</div>

<p>Runtime</p>

</div>

</div>

<!-- Counters -->

<div class="statistics">

<div class="card">

<h3>Submitted</h3>

<span id="submitted">

0

</span>

</div>

<div class="card">

<h3>Accepted</h3>

<span id="accepted">

0

</span>

</div>

<div class="card">

<h3>Rejected</h3>

<span id="rejected">

0

</span>

</div>

</div> 
     <!-- Console -->

<div class="console">

<h2>Running Window</h2>

<textarea
id="console"
readonly>

Rig-S® Ready...

Press START...

</textarea>

</div>

<!-- Buttons -->

<div class="buttons">

<button id="start">

▶ START

</button>

<button id="stop">

■ STOP

</button>

</div>

<!-- Visitor Counter -->

<div class="panel">

<h2>Visitors</h2>

<p>

Total Visitors :

<span id="totalVisitors">

0

</span>

</p>

</div>

<!-- Footer -->

<footer>

<hr>

<br>

<h3>

Rig-S®

</h3>

<p>

Version 0.1.0 Alpha

</p>

<p>

Professional Dashboard

</p>

<p>

C++ Backend

</p>

<br>

<p>

Copyright © 2026

Seliim Ahmed

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
